<svg viewBox="0 0 520 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="An MSP spend review being verified">
  <defs>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f5f9"/>
    </linearGradient>
    <linearGradient id="tealG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22b89f"/>
      <stop offset="100%" stop-color="#17a08c"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#040c22" flood-opacity=".45"/>
    </filter>
    <filter id="soft2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#040c22" flood-opacity=".38"/>
    </filter>
  </defs>

  <!-- back card: the MSP invoice, tilted, muted -->
  <g transform="rotate(-7 175 240)" filter="url(#soft)" opacity=".55">
    <rect x="58" y="86" width="235" height="300" rx="10" fill="#dfe5ee"/>
    <rect x="58" y="86" width="235" height="34" rx="10" fill="#c3ccd9"/>
    <rect x="58" y="110" width="235" height="10" fill="#c3ccd9"/>
    <text x="74" y="109" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#5d6a7d">MSP INVOICE</text>
    <g fill="#aeb8c6">
      <rect x="74" y="140" width="120" height="7" rx="3.5"/>
      <rect x="238" y="140" width="38" height="7" rx="3.5"/>
      <rect x="74" y="164" width="145" height="7" rx="3.5"/>
      <rect x="238" y="164" width="38" height="7" rx="3.5"/>
      <rect x="74" y="188" width="100" height="7" rx="3.5"/>
      <rect x="238" y="188" width="38" height="7" rx="3.5"/>
      <rect x="74" y="212" width="132" height="7" rx="3.5"/>
      <rect x="238" y="212" width="38" height="7" rx="3.5"/>
      <rect x="74" y="236" width="112" height="7" rx="3.5"/>
      <rect x="238" y="236" width="38" height="7" rx="3.5"/>
      <rect x="74" y="260" width="140" height="7" rx="3.5"/>
      <rect x="238" y="260" width="38" height="7" rx="3.5"/>
    </g>
    <rect x="74" y="292" width="202" height="1.5" fill="#aeb8c6"/>
    <rect x="74" y="310" width="70" height="9" rx="4.5" fill="#95a1b2"/>
    <rect x="226" y="310" width="50" height="9" rx="4.5" fill="#95a1b2"/>
  </g>

  <!-- front card: the VeriTech review -->
  <g transform="rotate(3 320 250)" filter="url(#soft)">
    <rect x="196" y="66" width="266" height="330" rx="12" fill="url(#cardG)"/>
    <!-- header bar -->
    <rect x="196" y="66" width="266" height="46" rx="12" fill="#16244a"/>
    <rect x="196" y="98" width="266" height="14" fill="#16244a"/>
    <text x="216" y="95" font-family="Inter, sans-serif" font-size="10.5" font-weight="700" letter-spacing="1.4" fill="#22b89f">MSP REVIEW</text>

    <!-- scorecard rows -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#5a6473">
      <!-- row 1 -->
      <circle cx="222" cy="146" r="6" fill="#c0392b"/>
      <text x="238" y="150" fill="#1b2437" font-weight="600">Cost fairness</text>
      <rect x="352" y="142" width="88" height="7" rx="3.5" fill="#e2e6ed"/>
      <rect x="352" y="142" width="16" height="7" rx="3.5" fill="#c0392b" opacity=".85"/>
      <!-- row 2 -->
      <circle cx="222" cy="180" r="6" fill="#c0392b"/>
      <text x="238" y="184" fill="#1b2437" font-weight="600">Security posture</text>
      <rect x="352" y="176" width="88" height="7" rx="3.5" fill="#e2e6ed"/>
      <rect x="352" y="176" width="24" height="7" rx="3.5" fill="#c0392b" opacity=".85"/>
      <!-- row 3 -->
      <circle cx="222" cy="214" r="6" fill="#c0392b"/>
      <text x="238" y="218" fill="#1b2437" font-weight="600">Backup proof</text>
      <rect x="352" y="210" width="88" height="7" rx="3.5" fill="#e2e6ed"/>
      <rect x="352" y="210" width="10" height="7" rx="3.5" fill="#c0392b" opacity=".85"/>
      <!-- row 4 -->
      <circle cx="222" cy="248" r="6" fill="#d99512"/>
      <text x="238" y="252" fill="#1b2437" font-weight="600">Licensing</text>
      <rect x="352" y="244" width="88" height="7" rx="3.5" fill="#e2e6ed"/>
      <rect x="352" y="244" width="48" height="7" rx="3.5" fill="#d99512" opacity=".9"/>
      <!-- row 5 -->
      <circle cx="222" cy="282" r="6" fill="#17a08c"/>
      <text x="238" y="286" fill="#1b2437" font-weight="600">Response time</text>
      <rect x="352" y="278" width="88" height="7" rx="3.5" fill="#e2e6ed"/>
      <rect x="352" y="278" width="66" height="7" rx="3.5" fill="#17a08c" opacity=".9"/>
    </g>

    <!-- divider -->
    <rect x="216" y="312" width="226" height="1.5" fill="#e2e6ed"/>

    <!-- savings callout -->
    <text x="216" y="340" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#5a6473">Projected annual savings</text>
    <text x="216" y="372" font-family="Fraunces, Georgia, serif" font-size="27" font-weight="600" fill="#17a08c">$30,600</text>
    <!-- down arrow indicating cost reduction -->
    <g transform="translate(404,352)">
      <circle r="17" fill="#e7f4f1"/>
      <path d="M0,-8 L0,7 M-6,1 L0,7 L6,1" stroke="#17a08c" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- verification badge: the checkmark stamp -->
  <g transform="translate(150,352)" filter="url(#soft2)">
    <circle r="46" fill="url(#tealG)"/>
    <circle r="46" fill="none" stroke="#ffffff" stroke-opacity=".28" stroke-width="2"/>
    <path d="M-19,2 L-6,15 L20,-14" stroke="#ffffff" stroke-width="6.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- accent dots -->
  <circle cx="470" cy="112" r="4" fill="#22b89f" opacity=".55"/>
  <circle cx="488" cy="150" r="2.6" fill="#22b89f" opacity=".35"/>
  <circle cx="82" cy="440" r="3.2" fill="#22b89f" opacity=".4"/>
</svg>
